        <path d="M50 90 Q40 50 30 30 M80 90 Q80 40 80 20 M110 90 Q120 45 130 25 M160 90 Q150 45 140 20 M190 90 Q200 50 210 30" stroke="#00b4d8" stroke-width="2.5" fill="none"/>
