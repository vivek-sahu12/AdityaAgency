        <!-- Openwell Label -->
        <rect x="50" y="180" width="180" height="26" rx="13" fill="#2563eb"/>
        <text x="140" y="197" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">SUBMERSIBLE OPENWELL PUMP</text>
